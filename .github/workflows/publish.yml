name: Publish to npm

# Triggered when a GitHub Release is published.
# Create the release via: gh release create vX.Y.Z --target main
# The tag MUST match the version in package.json (enforced in the publish job).
on:
  release:
    types: [published]

# Minimal permissions — id-token is required for npm provenance via OIDC.
# See: https://docs.npmjs.com/generating-provenance-statements
permissions:
  contents: read
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Gate: full test matrix must pass before publish is allowed.
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint (syntax check all source files)
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Dry-run pack (verify publishable artefact)
        run: npm pack --dry-run

  # ──────────────────────────────────────────────────────────────────
  # Publish: only runs if every test matrix cell passes.
  # Uses npm provenance (OIDC) — no long-lived NPM_TOKEN stored in secrets.
  # Fallback: set NPM_TOKEN secret in repo settings if your npm org has not
  # yet enabled Trusted Publishing (granular access tokens still work).
  # ──────────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 (LTS) with npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Verify the package.json version matches the release tag.
      # Prevents publishing stale version numbers if the tag and package.json
      # are ever accidentally out of sync.
      - name: Verify version matches release tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          echo "package.json version : $PKG_VERSION"
          echo "Release tag          : $RELEASE_TAG"
          if [ "$PKG_VERSION" != "$RELEASE_TAG" ]; then
            echo "::error::Version mismatch — package.json ($PKG_VERSION) != release tag ($RELEASE_TAG)"
            exit 1
          fi

      # Publish with provenance attestation.
      # --provenance attaches a signed SLSA build provenance statement to the
      # package on npmjs.com, visible under the 'Provenance' tab.
      # NODE_AUTH_TOKEN is set automatically by actions/setup-node when
      # registry-url is configured. Set NPM_TOKEN secret as a fallback.
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
